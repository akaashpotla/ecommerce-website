services:
  db:
    image: postgres:15
    container_name: ecommerce_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5434:5432"
    volumes:
      - ecommerce_postgres_data:/var/lib/postgresql/data

volumes:
  ecommerce_postgres_data: